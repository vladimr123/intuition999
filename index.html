<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Таблица 200×2 | Прицел (🎯) и Молния (⚡)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f7 0%, #d4e0e8 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            max-width: 1600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(3px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: #ffffffcc;
            padding: 12px 20px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-generate {
            background: #2b7a4b;
            color: white;
        }
        .btn-generate:hover { background: #1e5e3a; transform: translateY(-2px); }

        .btn-clear {
            background: #b91c1c;
            color: white;
        }
        .btn-clear:hover { background: #991b1b; transform: translateY(-2px); }

        .stats {
            background: #eef3fc;
            padding: 5px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #155f7c;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .hit-percent {
            background: #fff0f0;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .hit-percent span { font-size: 1.2rem; font-weight: 800; }

        .table-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            border-radius: 1.25rem;
            background: white;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
            margin: 20px 0 0;
            max-height: 70vh;
            scroll-behavior: smooth;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 600px;
            position: relative;
            background: white;
            z-index: 1;
        }

        th {
            background: #1f3b4c;
            color: white;
            font-weight: 600;
            padding: 14px 12px;
            font-size: 0.95rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #e2edf2;
            background-color: #ffffff;
            transition: background 0.1s;
            position: relative;
        }
        tr:hover td { background-color: #fef7e0; }

        .row-index {
            font-weight: 600;
            background-color: #f8fafc;
            color: #1f4e6e;
            width: 65px;
            border-right: 1px solid #dee9ef;
            font-size: 0.85rem;
            position: sticky;
            left: 0;
            z-index: 5;
        }

        input[type="number"] {
            width: 100%;
            max-width: 140px;
            padding: 9px 10px;
            font-size: 0.9rem;
            text-align: center;
            border: 2px solid #cbdde6;
            border-radius: 40px;
            background: white;
            font-weight: 500;
            transition: all 0.15s;
            outline: none;
            color: #0b3b4f;
            margin: 0 auto;
            display: inline-block;
            -moz-appearance: textfield;
            appearance: textfield;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.25);
        }
        input.valid-input {
            border-color: #2c9a6e;
            background-color: #f0fff4;
        }
        input.invalid-input {
            border-color: #e53e3e;
            background-color: #fff5f5;
        }

        .random-value {
            background: #f2f7fc;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            color: #0f5b7a;
            padding: 6px 12px;
            border-radius: 48px;
            min-width: 85px;
            background: #eef3fa;
            display: inline-block;
            transition: all 0.2s ease;
            position: relative;
            z-index: 2;
        }
        .random-value.highlight-green {
            background: #c6f7d0;
            color: #0a5e2e;
            box-shadow: 0 0 0 2px #2c9a6e55;
        }

        .target-icon {
            font-size: 1.6rem;
            width: 45px;
            text-align: center;
            display: inline-block;
        }

        .diff-badge {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 5px 10px;
            border-radius: 32px;
            display: inline-block;
            min-width: 60px;
            text-align: center;
            transition: all 0.2s ease;
        }
        .diff-badge.horizontal-hit {
            background: #86efac;
            color: #166534;
            box-shadow: 0 0 0 2px #2c9a6e;
            border: 2px solid #2c9a6e;
        }
        .diff-badge.vertical-hit {
            background: #fde047;
            color: #854d0e;
            box-shadow: 0 0 0 2px #eab308;
            border: none;
        }

        /* Градиентная стрелка: светло-жёлтая → жёлтая */
        .connector-arrow {
            position: absolute;
            z-index: 9999;
            pointer-events: none;
        }
        .arrow-line {
            position: absolute;
            background: linear-gradient(90deg, #fef9c3, #fde047);
            height: 4px;
            border-radius: 4px;
            box-shadow: 0 0 3px rgba(253, 224, 71, 0.6);
        }
        .arrow-head {
            position: absolute;
            width: 0;
            height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 12px solid #fde047;
            filter: drop-shadow(0 0 2px rgba(253, 224, 71, 0.5));
        }

        @media (max-width: 700px) {
            .app-container { padding: 1rem; }
            td, th { padding: 8px 6px; }
            input[type="number"] { max-width: 100px; font-size: 0.8rem; padding: 6px 5px; }
            .random-value { font-size: 0.8rem; min-width: 65px; padding: 4px 8px; }
            .row-index { width: 50px; }
            .target-icon { font-size: 1.3rem; width: 35px; }
            .diff-badge { font-size: 0.7rem; padding: 3px 6px; min-width: 45px; }
            .arrow-line { height: 3px; }
            .arrow-head { border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 9px solid #fde047; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="toolbar">
        <div class="btn-group">
            <button id="global-generate-btn" class="btn-generate">😊 Сгенерировать</button>
            <button id="clear-all-btn" class="btn-clear">🧹 Очистить</button>
        </div>
        <div class="stats">
            <span>✅ Всего: <strong id="valid-count">0</strong></span>
            <span>🎯 Попаданий: <strong id="hit-count">0</strong></span>
            <div class="hit-percent">📊 Процент попаданий: <span id="percent-value">0.00</span>%</div>
        </div>
    </div>
    <div class="table-wrapper" id="table-wrapper">
        <table id="data-table">
            <thead><tr><th>#</th><th></th><th></th><th></th><th></th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    (function() {
        const ROWS = 200;
        // Диапазон поиска: выше на 1-2 строки, ниже на 1-2 строки
        const UP_OFFSETS = [-1, -2];
        const DOWN_OFFSETS = [1, 2];
        const ALL_OFFSETS = [...UP_OFFSETS, ...DOWN_OFFSETS];
        
        const wrapper = document.getElementById('table-wrapper');
        const tbody = document.getElementById('table-body');
        const validSpan = document.getElementById('valid-count');
        const hitSpan = document.getElementById('hit-count');
        const percentSpan = document.getElementById('percent-value');
        
        let inputs = [], randomSpans = [], targetIcons = [], diffSpans = [];
        let arrows = [], updateTimer = null;
        
        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        
        function validate(v) {
            if (v === null || v === undefined || v === "") return { ok: false, val: null };
            let n = Number(v);
            if (isNaN(n)) return { ok: false, val: null };
            if (Number.isInteger(n) && n >= 100 && n <= 999) return { ok: true, val: n };
            return { ok: false, val: null };
        }
        
        function getInputVal(row) { let v = validate(inputs[row]?.value); return v.ok ? v.val : null; }
        function getRandomVal(row) {
            let span = randomSpans[row];
            if (!span) return null;
            let txt = span.textContent;
            if (txt === '—' || !txt) return null;
            let n = Number(txt);
            return (n >= 100 && n <= 999) ? n : null;
        }
        
        function isHorHit(row) {
            let a = getInputVal(row), b = getRandomVal(row);
            if (a !== null && b !== null) { let d = Math.abs(a - b); return d >= 1 && d <= 20; }
            return false;
        }
        
        function isVertHit(randomRow, inputRow) {
            if (randomRow < 0 || inputRow < 0 || randomRow >= ROWS || inputRow >= ROWS) return false;
            let b = getRandomVal(randomRow), a = getInputVal(inputRow);
            if (a !== null && b !== null) { let d = Math.abs(a - b); return d >= 1 && d <= 20; }
            return false;
        }
        
        function findVertHitForRow(randomRow) {
            for (let off of ALL_OFFSETS) {
                let inp = randomRow + off;
                if (inp >= 0 && inp < ROWS && isVertHit(randomRow, inp)) return inp;
            }
            return null;
        }
        
        function updateRowVisuals(row) {
            let icon = targetIcons[row], rspan = randomSpans[row];
            if (!icon || !rspan) return;
            if (isHorHit(row)) {
                icon.innerHTML = '🎯';
                icon.style.opacity = '1';
                rspan.classList.add('highlight-green');
            } else {
                let hasVert = (findVertHitForRow(row) !== null);
                if (hasVert) {
                    icon.innerHTML = '⚡';
                    icon.style.opacity = '1';
                } else {
                    icon.innerHTML = '—';
                    icon.style.opacity = '0.3';
                }
                rspan.classList.remove('highlight-green');
            }
        }
        
        function drawArrowBetweenFields(randomRow, inputRow) {
            let rows = tbody.querySelectorAll('tr');
            if (randomRow >= rows.length || inputRow >= rows.length) return;
            let cellRand = rows[randomRow].querySelectorAll('td')[2];
            let cellInp = rows[inputRow].querySelectorAll('td')[1];
            if (!cellRand || !cellInp) return;
            
            let wrapperRect = wrapper.getBoundingClientRect();
            let rectRand = cellRand.getBoundingClientRect();
            let rectInp = cellInp.getBoundingClientRect();
            
            // Начало стрелки: левый край поля столбца 2 + 20% от ширины ячейки
            let offsetX = rectRand.width * 0.2;
            let startX = rectRand.left + offsetX - wrapperRect.left;
            let startY = rectRand.top + rectRand.height / 2 - wrapperRect.top;
            // Конец стрелки: правый край поля столбца 1
            let endX = rectInp.right - wrapperRect.left;
            let endY = rectInp.top + rectInp.height / 2 - wrapperRect.top;
            
            let length = Math.hypot(endX - startX, endY - startY);
            let angle = Math.atan2(endY - startY, endX - startX) * 180 / Math.PI;
            
            let container = document.createElement('div');
            container.className = 'connector-arrow';
            
            let line = document.createElement('div');
            line.className = 'arrow-line';
            line.style.width = `${Math.max(0, length - 12)}px`;
            line.style.height = '4px';
            line.style.left = '0';
            line.style.top = '0';
            
            let head = document.createElement('div');
            head.className = 'arrow-head';
            head.style.left = `${Math.max(0, length - 12)}px`;
            head.style.top = '-6px';
            
            container.appendChild(line);
            container.appendChild(head);
            container.style.width = `${length}px`;
            container.style.height = '4px';
            container.style.left = `${startX}px`;
            container.style.top = `${startY}px`;
            container.style.transform = `rotate(${angle}deg)`;
            container.style.transformOrigin = '0 0';
            container.style.position = 'absolute';
            
            wrapper.style.position = 'relative';
            wrapper.appendChild(container);
            arrows.push(container);
        }
        
        function updateAllBadgesAndArrows() {
            // Удаляем все стрелки
            arrows.forEach(a => a.remove());
            arrows = [];
            
            for (let i = 0; i < ROWS; i++) {
                let dspan = diffSpans[i];
                if (!dspan) continue;
                
                let vertHitRow = findVertHitForRow(i);
                
                if (vertHitRow !== null) {
                    let b = getRandomVal(i), a = getInputVal(vertHitRow);
                    if (b !== null && a !== null) {
                        let diff = b - a;
                        let txt = diff > 0 ? `+${diff}` : `${diff}`;
                        dspan.textContent = txt;
                        dspan.className = 'diff-badge vertical-hit';
                        dspan.style.opacity = '1';
                        drawArrowBetweenFields(i, vertHitRow);
                    }
                } else if (isHorHit(i)) {
                    let a = getInputVal(i), b = getRandomVal(i);
                    if (a !== null && b !== null) {
                        let diff = b - a;
                        let txt = diff > 0 ? `+${diff}` : `${diff}`;
                        dspan.textContent = txt;
                        dspan.className = 'diff-badge horizontal-hit';
                        dspan.style.opacity = '1';
                    }
                } else {
                    dspan.textContent = '—';
                    dspan.className = 'diff-badge';
                    dspan.style.backgroundColor = '#f3f4f6';
                    dspan.style.color = '#9ca3af';
                    dspan.style.opacity = '0.5';
                    dspan.style.border = 'none';
                }
            }
            
            // Обновляем иконки (прицел/молния)
            for (let i = 0; i < ROWS; i++) {
                updateRowVisuals(i);
            }
        }
        
        function countValid() { 
            let c = 0; 
            for(let i = 0; i < ROWS; i++) {
                let val = getInputVal(i);
                if(val !== null && val >= 100 && val <= 999) c++; 
            }
            return c; 
        }
        
        function countHits() { let c=0; for(let i=0;i<ROWS;i++) if(isHorHit(i)) c++; return c; }
        
        function updateStats() {
            let valid = countValid(), hits = countHits();
            validSpan.textContent = valid;
            hitSpan.textContent = hits;
            let pct = valid ? (hits/valid)*100 : 0;
            percentSpan.textContent = pct.toFixed(2);
        }
        
        function fullUpdate() {
            updateAllBadgesAndArrows();
            updateStats();
        }
        
        function schedule() { if(updateTimer) clearTimeout(updateTimer); updateTimer = setTimeout(()=>{ fullUpdate(); updateTimer=null; }, 10); }
        
        function generateAll() {
            for (let i=0; i<ROWS; i++) {
                if(randomSpans[i]) {
                    randomSpans[i].textContent = rand(100,999);
                    randomSpans[i].classList.remove('highlight-green');
                }
            }
            fullUpdate();
            let btn = document.getElementById('global-generate-btn');
            if(btn) { btn.style.transform='scale(0.98)'; setTimeout(()=>{ if(btn) btn.style.transform=''; }, 120); }
        }
        
        function clearAll() {
            for(let i=0;i<ROWS;i++) {
                if(inputs[i]) { 
                    inputs[i].value=''; 
                    inputs[i].classList.remove('valid-input','invalid-input');
                }
                if(randomSpans[i]) { 
                    randomSpans[i].textContent='—'; 
                    randomSpans[i].classList.remove('highlight-green');
                }
                if(targetIcons[i]) { 
                    targetIcons[i].innerHTML='—'; 
                    targetIcons[i].style.opacity='0.3';
                }
                if(diffSpans[i]) {
                    diffSpans[i].textContent='—';
                    diffSpans[i].className='diff-badge';
                    diffSpans[i].style.backgroundColor='#f3f4f6';
                    diffSpans[i].style.color='#9ca3af';
                    diffSpans[i].style.opacity='0.5';
                    diffSpans[i].style.border = 'none';
                }
            }
            fullUpdate();
        }
        
        function enforceLimitAndMove(inp, row) {
            let v = inp.value;
            if(v.length > 3) inp.value = v.slice(0,3);
            let n = Number(inp.value);
            if(n > 999) inp.value = 999;
            setTimeout(() => {
                if(inp.value.length === 3 && row < ROWS-1) {
                    let next = inputs[row+1];
                    if(next) { next.focus(); next.select(); }
                }
            }, 5);
        }
        
        function onInput(e, row) {
            let inp = e.target;
            enforceLimitAndMove(inp, row);
            let val = inp.value;
            let res = validate(val);
            if(res.ok) inp.classList.add('valid-input'), inp.classList.remove('invalid-input');
            else inp.classList.remove('valid-input'), inp.classList.add('invalid-input');
            schedule();
        }
        
        function buildTable() {
            tbody.innerHTML = '';
            inputs = []; randomSpans = []; targetIcons = []; diffSpans = [];
            let frag = document.createDocumentFragment();
            for(let i=0; i<ROWS; i++) {
                let tr = document.createElement('tr');
                let tdIdx = document.createElement('td'); tdIdx.className='row-index'; tdIdx.textContent=`${i+1}`; tr.appendChild(tdIdx);
                let tdInp = document.createElement('td'); let inp = document.createElement('input'); inp.type='number'; inp.placeholder=''; inp.step='1'; inp.min='100'; inp.max='999'; inp.value=''; tdInp.appendChild(inp); tr.appendChild(tdInp);
                let tdRand = document.createElement('td'); let rspan = document.createElement('span'); rspan.className='random-value'; rspan.textContent='—'; tdRand.appendChild(rspan); tr.appendChild(tdRand);
                let tdIcon = document.createElement('td'); let icon = document.createElement('span'); icon.className='target-icon'; icon.innerHTML='—'; icon.style.opacity='0.3'; tdIcon.appendChild(icon); tr.appendChild(tdIcon);
                let tdDiff = document.createElement('td'); let dspan = document.createElement('span'); dspan.className='diff-badge'; dspan.textContent='—'; dspan.style.backgroundColor='#f3f4f6'; dspan.style.color='#9ca3af'; dspan.style.opacity='0.5'; tdDiff.appendChild(dspan); tr.appendChild(tdDiff);
                frag.appendChild(tr);
                inputs.push(inp); randomSpans.push(rspan); targetIcons.push(icon); diffSpans.push(dspan);
                inp.addEventListener('input', (idx => e => onInput(e, idx))(i));
            }
            tbody.appendChild(frag);
            
            updateStats();
        }
        
        function bindButtons() {
            let gen = document.getElementById('global-generate-btn');
            if(gen) { let ng = gen.cloneNode(true); gen.parentNode.replaceChild(ng, gen); ng.addEventListener('click', generateAll); }
            let clr = document.getElementById('clear-all-btn');
            if(clr) { let nc = clr.cloneNode(true); clr.parentNode.replaceChild(nc, clr); nc.addEventListener('click', clearAll); }
        }
        
        function refreshOnScrollResize() {
            fullUpdate();
        }
        
        function init() {
            buildTable();
            bindButtons();
            window.addEventListener('resize', refreshOnScrollResize);
            wrapper.addEventListener('scroll', refreshOnScrollResize);
            setTimeout(() => fullUpdate(), 100);
        }
        init();
    })();
</script>
</body>
</html>
